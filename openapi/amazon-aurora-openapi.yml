openapi: 3.1.0
info:
  title: Amazon Aurora API
  description: >-
    Amazon Aurora is a MySQL and PostgreSQL-compatible relational database built for the cloud that combines the performance and availability of traditional enterprise databases with the simplicity and cost-effectiveness of open source databases. The Aurora API is accessed through the Amazon RDS API.
  version: '2014-10-31'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://rds.us-east-1.amazonaws.com
    description: Amazon Aurora API endpoint (via Amazon RDS)
security:
  - sigv4: []
tags:
  - name: DB Clusters
    description: Operations for managing Aurora DB clusters
  - name: DB Instances
    description: Operations for managing Aurora DB instances within clusters
  - name: DB Cluster Snapshots
    description: Operations for managing Aurora cluster snapshots
  - name: DB Cluster Parameter Groups
    description: Operations for managing Aurora cluster parameter groups
  - name: DB Cluster Endpoints
    description: Operations for managing Aurora cluster endpoints
  - name: Global Clusters
    description: Operations for managing Aurora Global Databases
paths:
  /?Action=CreateDBCluster:
    post:
      operationId: createDBCluster
      summary: Amazon Aurora Create DB Cluster
      description: Creates a new Amazon Aurora DB cluster. You can use the ReplicationSourceIdentifier parameter to create an Amazon Aurora DB cluster as a read replica of another DB cluster.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDBClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
                  Engine: "aurora-postgresql"
                  EngineVersion: "15.3"
                  MasterUsername: "admin"
                  MasterUserPassword: "MyPassword123!"
                  DatabaseName: "mydb"
                  VpcSecurityGroupIds:
                    - "sg-12345678"
                  DBSubnetGroupName: "my-subnet-group"
                  BackupRetentionPeriod: 7
                  Tags:
                    - Key: "Environment"
                      Value: "Production"
      responses:
        '200':
          description: DB cluster created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDBClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    CreateDBClusterResult:
                      DBCluster:
                        DBClusterIdentifier: "my-aurora-cluster"
                        Status: "creating"
                        Engine: "aurora-postgresql"
                        EngineVersion: "15.3"
                        DBClusterArn: "arn:aws:rds:us-east-1:123456789012:cluster:my-aurora-cluster"
  /?Action=DeleteDBCluster:
    post:
      operationId: deleteDBCluster
      summary: Amazon Aurora Delete DB Cluster
      description: Deletes a previously provisioned DB cluster. When you delete a DB cluster, all automated backups for that DB cluster are deleted and can't be recovered.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteDBClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
                  SkipFinalSnapshot: true
      responses:
        '200':
          description: DB cluster deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDBClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DeleteDBClusterResult:
                      DBCluster:
                        DBClusterIdentifier: "my-aurora-cluster"
                        Status: "deleting"
  /?Action=DescribeDBClusters:
    post:
      operationId: describeDBClusters
      summary: Amazon Aurora Describe DB Clusters
      description: Returns information about provisioned Amazon Aurora DB clusters.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeDBClustersInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  MaxRecords: 20
      responses:
        '200':
          description: DB clusters described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeDBClustersOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DescribeDBClustersResult:
                      DBClusters:
                        - DBClusterIdentifier: "my-aurora-cluster"
                          Status: "available"
                          Engine: "aurora-postgresql"
                          EngineVersion: "15.3"
                          Endpoint: "my-aurora-cluster.cluster-xyz.us-east-1.rds.amazonaws.com"
                      Marker: ""
  /?Action=ModifyDBCluster:
    post:
      operationId: modifyDBCluster
      summary: Amazon Aurora Modify DB Cluster
      description: Modifies settings for a DB cluster. You can change one or more database configuration parameters by specifying these parameters and the new values in the request.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyDBClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
                  BackupRetentionPeriod: 14
                  ApplyImmediately: true
      responses:
        '200':
          description: DB cluster modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyDBClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    ModifyDBClusterResult:
                      DBCluster:
                        DBClusterIdentifier: "my-aurora-cluster"
                        Status: "modifying"
  /?Action=StartDBCluster:
    post:
      operationId: startDBCluster
      summary: Amazon Aurora Start DB Cluster
      description: Starts an Amazon Aurora DB cluster that was stopped using the StopDBCluster action.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDBClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
      responses:
        '200':
          description: DB cluster started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartDBClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    StartDBClusterResult:
                      DBCluster:
                        DBClusterIdentifier: "my-aurora-cluster"
                        Status: "starting"
  /?Action=StopDBCluster:
    post:
      operationId: stopDBCluster
      summary: Amazon Aurora Stop DB Cluster
      description: Stops an Amazon Aurora DB cluster. When you stop a DB cluster, Amazon RDS retains the DB cluster's metadata, including its endpoints and DB parameter groups.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopDBClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
      responses:
        '200':
          description: DB cluster stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopDBClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    StopDBClusterResult:
                      DBCluster:
                        DBClusterIdentifier: "my-aurora-cluster"
                        Status: "stopping"
  /?Action=RebootDBCluster:
    post:
      operationId: rebootDBCluster
      summary: Amazon Aurora Reboot DB Cluster
      description: Reboots an Amazon Aurora DB cluster.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RebootDBClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
      responses:
        '200':
          description: DB cluster rebooted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebootDBClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    RebootDBClusterResult:
                      DBCluster:
                        DBClusterIdentifier: "my-aurora-cluster"
                        Status: "rebooting"
  /?Action=RestoreDBClusterFromSnapshot:
    post:
      operationId: restoreDBClusterFromSnapshot
      summary: Amazon Aurora Restore DB Cluster From Snapshot
      description: Creates a new DB cluster from a DB snapshot or DB cluster snapshot.
      tags:
        - DB Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreDBClusterFromSnapshotInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-restored-cluster"
                  SnapshotIdentifier: "my-cluster-snapshot"
                  Engine: "aurora-postgresql"
      responses:
        '200':
          description: DB cluster restore started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreDBClusterFromSnapshotOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    RestoreDBClusterFromSnapshotResult:
                      DBCluster:
                        DBClusterIdentifier: "my-restored-cluster"
                        Status: "creating"
  /?Action=CreateDBInstance:
    post:
      operationId: createDBInstance
      summary: Amazon Aurora Create DB Instance
      description: Creates a new DB instance. DB instances are the compute and memory capacity of an Aurora DB cluster.
      tags:
        - DB Instances
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDBInstanceInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBInstanceIdentifier: "my-aurora-instance"
                  DBInstanceClass: "db.r6g.large"
                  Engine: "aurora-postgresql"
                  DBClusterIdentifier: "my-aurora-cluster"
      responses:
        '200':
          description: DB instance created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDBInstanceOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    CreateDBInstanceResult:
                      DBInstance:
                        DBInstanceIdentifier: "my-aurora-instance"
                        DBInstanceStatus: "creating"
                        DBInstanceClass: "db.r6g.large"
  /?Action=DeleteDBInstance:
    post:
      operationId: deleteDBInstance
      summary: Amazon Aurora Delete DB Instance
      description: Deletes a previously provisioned DB instance.
      tags:
        - DB Instances
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteDBInstanceInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBInstanceIdentifier: "my-aurora-instance"
      responses:
        '200':
          description: DB instance deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDBInstanceOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DeleteDBInstanceResult:
                      DBInstance:
                        DBInstanceIdentifier: "my-aurora-instance"
                        DBInstanceStatus: "deleting"
  /?Action=DescribeDBInstances:
    post:
      operationId: describeDBInstances
      summary: Amazon Aurora Describe DB Instances
      description: Returns information about provisioned RDS instances associated with Aurora clusters.
      tags:
        - DB Instances
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeDBInstancesInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  MaxRecords: 20
      responses:
        '200':
          description: DB instances described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeDBInstancesOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DescribeDBInstancesResult:
                      DBInstances:
                        - DBInstanceIdentifier: "my-aurora-instance"
                          DBInstanceStatus: "available"
                          DBInstanceClass: "db.r6g.large"
                          Engine: "aurora-postgresql"
                      Marker: ""
  /?Action=CreateDBClusterSnapshot:
    post:
      operationId: createDBClusterSnapshot
      summary: Amazon Aurora Create DB Cluster Snapshot
      description: Creates a snapshot of a DB cluster.
      tags:
        - DB Cluster Snapshots
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDBClusterSnapshotInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterSnapshotIdentifier: "my-cluster-snapshot"
                  DBClusterIdentifier: "my-aurora-cluster"
                  Tags:
                    - Key: "Purpose"
                      Value: "Backup"
      responses:
        '200':
          description: DB cluster snapshot created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDBClusterSnapshotOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    CreateDBClusterSnapshotResult:
                      DBClusterSnapshot:
                        DBClusterSnapshotIdentifier: "my-cluster-snapshot"
                        Status: "creating"
                        DBClusterIdentifier: "my-aurora-cluster"
  /?Action=DeleteDBClusterSnapshot:
    post:
      operationId: deleteDBClusterSnapshot
      summary: Amazon Aurora Delete DB Cluster Snapshot
      description: Deletes a DB cluster snapshot. If the snapshot is being copied, the copy operation is terminated.
      tags:
        - DB Cluster Snapshots
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteDBClusterSnapshotInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterSnapshotIdentifier: "my-cluster-snapshot"
      responses:
        '200':
          description: DB cluster snapshot deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDBClusterSnapshotOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DeleteDBClusterSnapshotResult:
                      DBClusterSnapshot:
                        DBClusterSnapshotIdentifier: "my-cluster-snapshot"
                        Status: "deleted"
  /?Action=DescribeDBClusterSnapshots:
    post:
      operationId: describeDBClusterSnapshots
      summary: Amazon Aurora Describe DB Cluster Snapshots
      description: Returns information about DB cluster snapshots.
      tags:
        - DB Cluster Snapshots
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeDBClusterSnapshotsInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
                  MaxRecords: 20
      responses:
        '200':
          description: DB cluster snapshots described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeDBClusterSnapshotsOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DescribeDBClusterSnapshotsResult:
                      DBClusterSnapshots:
                        - DBClusterSnapshotIdentifier: "my-cluster-snapshot"
                          Status: "available"
                          DBClusterIdentifier: "my-aurora-cluster"
                      Marker: ""
  /?Action=CreateDBClusterParameterGroup:
    post:
      operationId: createDBClusterParameterGroup
      summary: Amazon Aurora Create DB Cluster Parameter Group
      description: Creates a new DB cluster parameter group. Parameters in a DB cluster parameter group apply to all of the instances in a DB cluster.
      tags:
        - DB Cluster Parameter Groups
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDBClusterParameterGroupInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterParameterGroupName: "my-aurora-pg-params"
                  DBParameterGroupFamily: "aurora-postgresql15"
                  Description: "Custom parameter group for Aurora PostgreSQL"
      responses:
        '200':
          description: DB cluster parameter group created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDBClusterParameterGroupOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    CreateDBClusterParameterGroupResult:
                      DBClusterParameterGroup:
                        DBClusterParameterGroupName: "my-aurora-pg-params"
                        DBParameterGroupFamily: "aurora-postgresql15"
                        Description: "Custom parameter group for Aurora PostgreSQL"
  /?Action=DescribeDBClusterParameterGroups:
    post:
      operationId: describeDBClusterParameterGroups
      summary: Amazon Aurora Describe DB Cluster Parameter Groups
      description: Returns a list of DBClusterParameterGroup descriptions.
      tags:
        - DB Cluster Parameter Groups
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeDBClusterParameterGroupsInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  MaxRecords: 20
      responses:
        '200':
          description: DB cluster parameter groups described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeDBClusterParameterGroupsOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DescribeDBClusterParameterGroupsResult:
                      DBClusterParameterGroups:
                        - DBClusterParameterGroupName: "my-aurora-pg-params"
                          DBParameterGroupFamily: "aurora-postgresql15"
                      Marker: ""
  /?Action=CreateDBClusterEndpoint:
    post:
      operationId: createDBClusterEndpoint
      summary: Amazon Aurora Create DB Cluster Endpoint
      description: Creates a new custom endpoint and associates it with an Amazon Aurora DB cluster.
      tags:
        - DB Cluster Endpoints
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDBClusterEndpointInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
                  DBClusterEndpointIdentifier: "my-custom-endpoint"
                  EndpointType: "READER"
                  StaticMembers:
                    - "my-aurora-instance-1"
      responses:
        '200':
          description: DB cluster endpoint created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDBClusterEndpointOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DBClusterEndpointIdentifier: "my-custom-endpoint"
                    DBClusterIdentifier: "my-aurora-cluster"
                    EndpointType: "CUSTOM"
                    CustomEndpointType: "READER"
                    Status: "creating"
  /?Action=DescribeDBClusterEndpoints:
    post:
      operationId: describeDBClusterEndpoints
      summary: Amazon Aurora Describe DB Cluster Endpoints
      description: Returns information about endpoints for an Amazon Aurora DB cluster.
      tags:
        - DB Cluster Endpoints
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeDBClusterEndpointsInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  DBClusterIdentifier: "my-aurora-cluster"
                  MaxRecords: 20
      responses:
        '200':
          description: DB cluster endpoints described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeDBClusterEndpointsOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DescribeDBClusterEndpointsResult:
                      DBClusterEndpoints:
                        - DBClusterEndpointIdentifier: "my-custom-endpoint"
                          EndpointType: "CUSTOM"
                          Endpoint: "my-custom-endpoint.cluster-xyz.us-east-1.rds.amazonaws.com"
                          Status: "available"
                      Marker: ""
  /?Action=CreateGlobalCluster:
    post:
      operationId: createGlobalCluster
      summary: Amazon Aurora Create Global Cluster
      description: Creates an Aurora global database spread across multiple Amazon Web Services Regions.
      tags:
        - Global Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGlobalClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  GlobalClusterIdentifier: "my-global-cluster"
                  SourceDBClusterIdentifier: "arn:aws:rds:us-east-1:123456789012:cluster:my-aurora-cluster"
      responses:
        '200':
          description: Global cluster created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGlobalClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    CreateGlobalClusterResult:
                      GlobalCluster:
                        GlobalClusterIdentifier: "my-global-cluster"
                        Status: "creating"
  /?Action=DeleteGlobalCluster:
    post:
      operationId: deleteGlobalCluster
      summary: Amazon Aurora Delete Global Cluster
      description: Deletes a global database cluster. The primary and secondary clusters must already be detached or deleted before attempting to delete a global cluster.
      tags:
        - Global Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteGlobalClusterInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  GlobalClusterIdentifier: "my-global-cluster"
      responses:
        '200':
          description: Global cluster deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteGlobalClusterOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DeleteGlobalClusterResult:
                      GlobalCluster:
                        GlobalClusterIdentifier: "my-global-cluster"
                        Status: "deleting"
  /?Action=DescribeGlobalClusters:
    post:
      operationId: describeGlobalClusters
      summary: Amazon Aurora Describe Global Clusters
      description: Returns information about Aurora global database clusters.
      tags:
        - Global Clusters
      x-microcks-operation:
        delay: 100
        dispatcher: QUERY_MATCH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeGlobalClustersInput'
            examples:
              default:
                x-microcks-default: true
                value:
                  MaxRecords: 20
      responses:
        '200':
          description: Global clusters described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeGlobalClustersOutput'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    DescribeGlobalClustersResult:
                      GlobalClusters:
                        - GlobalClusterIdentifier: "my-global-cluster"
                          Status: "available"
                          Engine: "aurora-postgresql"
                      Marker: ""
components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
  schemas:
    Tag:
      type: object
      properties:
        Key:
          type: string
        Value:
          type: string
    DBCluster:
      type: object
      properties:
        DBClusterIdentifier:
          type: string
        DBClusterArn:
          type: string
        Status:
          type: string
        Engine:
          type: string
        EngineVersion:
          type: string
        Endpoint:
          type: string
        ReaderEndpoint:
          type: string
        MultiAZ:
          type: boolean
        DatabaseName:
          type: string
        BackupRetentionPeriod:
          type: integer
        DBClusterParameterGroup:
          type: string
        DBSubnetGroup:
          type: string
        VpcSecurityGroups:
          type: array
          items:
            $ref: '#/components/schemas/VpcSecurityGroupMembership'
        ClusterCreateTime:
          type: string
          format: date-time
        MasterUsername:
          type: string
        StorageEncrypted:
          type: boolean
        KmsKeyId:
          type: string
        DBClusterMembers:
          type: array
          items:
            $ref: '#/components/schemas/DBClusterMember'
    DBClusterMember:
      type: object
      properties:
        DBInstanceIdentifier:
          type: string
        IsClusterWriter:
          type: boolean
        DBClusterParameterGroupStatus:
          type: string
        PromotionTier:
          type: integer
    VpcSecurityGroupMembership:
      type: object
      properties:
        VpcSecurityGroupId:
          type: string
        Status:
          type: string
    DBInstance:
      type: object
      properties:
        DBInstanceIdentifier:
          type: string
        DBInstanceClass:
          type: string
        Engine:
          type: string
        DBInstanceStatus:
          type: string
        DBClusterIdentifier:
          type: string
        Endpoint:
          $ref: '#/components/schemas/Endpoint'
        AvailabilityZone:
