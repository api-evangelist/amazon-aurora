apis:
  - name: Amazon Aurora API
    description: >-
      The Amazon Aurora API is accessed through the Amazon RDS API and enables
      programmatic management of Aurora DB clusters, instances, snapshots,
      parameter groups, and other database resources for both MySQL and
      PostgreSQL compatible editions.
